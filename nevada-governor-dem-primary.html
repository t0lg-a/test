:root{
  --bg-base:#f8f9fc; --bg-surface:#eef0f7; --bg-elevated:#ffffff;
  --text-primary:#1a1a1a; --text-secondary:#4a4a4a; --text-muted:#737373;
  --accent-deep:#351c71; --accent:#7c3aed; --focus:#c9b6ff;
  --stroke:#e5e5e5; --menu-border:#dcdce7; --secondary-border:#d2d2d7;
  --card-shadow:0 18px 44px rgba(23,25,38,.08);
  --menu-shadow:0 22px 48px rgba(53,28,113,.16);
  --font-head:"TT Norms Pro","Avenir Next",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --font-body:"Avenir Next",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --becerra-strong:#2980b9; --steyer-strong:#7c3aed; --porter-strong:#16a085;
  --mahan-strong:#f1c40f; --hilton-strong:#c0392b; --bianco-strong:#e67e22;
}
*,*::before,*::after{box-sizing:border-box;}
html{font-size:16px;}
body{margin:0;background:var(--bg-base);color:var(--text-primary);font-family:var(--font-body);font-weight:400;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}

/* candidate color classes (popup + leader card) */
.becerra{color:var(--becerra-strong);} .steyer{color:var(--steyer-strong);}
.porter{color:var(--porter-strong);} .mahan{color:var(--mahan-strong);}
.hilton{color:var(--hilton-strong);} .bianco{color:var(--bianco-strong);}
.others{color:#7f8c8d;}

/* ---- layout ---- */
.vh-root{padding:28px 20px 56px;min-height:100%;}
.vh-wrap{max-width:1480px;margin:0 auto;}
.vh-grid{display:grid;grid-template-columns:1fr 400px;gap:20px;align-items:start;}
@media(max-width:1100px){.vh-grid{grid-template-columns:1fr;}}
.right-col{position:sticky;top:22px;height:var(--sidebar-match-height,calc(100vh - 44px));max-height:var(--sidebar-match-height,calc(100vh - 44px));overflow-y:auto;padding-right:8px;scrollbar-width:none;-ms-overflow-style:none;}
.demo-header{margin:2px 2px 14px;}
.demo-title{font-family:var(--font-head);font-size:12px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text-secondary);}
.demo-sub{font-size:11px;color:var(--text-muted);line-height:1.45;margin-top:5px;}
.right-col::-webkit-scrollbar{display:none;}
.right-col::after{content:"";display:block;height:18px;pointer-events:none;position:sticky;z-index:3;bottom:0;margin-top:-18px;background:linear-gradient(to top,var(--bg-base),rgba(248,249,252,0));}
.right-col .vh-card{box-shadow:none;}
@media(max-width:1200px){.right-col{position:static;height:auto;max-height:none;overflow:visible;padding-right:0;}.right-col::after{display:none;}.reset-btn{position:static;}}

/* ---- results bars ---- */
.cand-bars{background:var(--bg-elevated);border:1px solid var(--menu-border);border-radius:16px;box-shadow:var(--card-shadow);padding:4px 20px 12px;margin-bottom:16px;}
.bars-head{display:flex;align-items:center;justify-content:flex-end;padding:12px 0 6px;border-bottom:1px solid var(--stroke);margin-bottom:2px;}
.bars-cap{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);}
.bars-toggle{display:inline-flex;align-items:center;gap:5px;background:var(--bg-surface);border:1px solid var(--menu-border);border-radius:999px;padding:3px 10px;cursor:pointer;font-family:var(--font-body);font-size:10.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text-secondary);transition:background-color .15s ease;}
.bars-toggle:hover{background:#e4e6ef;}
.bars-toggle .chev{transition:transform .2s ease;}
.bars-toggle .chev.open{transform:rotate(180deg);}
.cand-row{display:grid;grid-template-columns:250px 1fr 66px;gap:16px;align-items:center;padding:12px 0;}
.cand-row + .cand-row{border-top:1px solid var(--stroke);}
.cutoff-row + .cand-row{border-top:none;}
.cand-name-block{display:flex;align-items:center;gap:11px;min-width:0;}
.cand-avatar{width:34px;height:34px;border-radius:50%;object-fit:cover;border:1.5px solid #fff;box-shadow:0 0 0 1px var(--stroke);flex-shrink:0;}
.cand-text{min-width:0;}
.cand-name{font-family:var(--font-head);font-weight:600;font-size:14px;display:flex;align-items:center;min-width:0;}
.cand-name-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
.party-tag{flex-shrink:0;margin-left:7px;display:inline-flex;align-items:center;justify-content:center;min-width:17px;height:17px;padding:0 3px;font-size:10.5px;font-weight:700;color:#fff;border-radius:4px;line-height:1;}
.party-tag.dem{background:#026EB6;}
.party-tag.gop{background:#CC0000;}
.advances-badge{flex-shrink:0;margin-left:7px;display:inline-flex;align-items:center;height:17px;padding:0 6px;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#fff;border-radius:4px;line-height:1;}
.advances-badge{background:var(--accent);}
.cand-sub{font-size:11px;color:var(--text-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-track{height:20px;background:var(--bg-surface);border-radius:999px;overflow:hidden;}
.bar-fill{height:100%;border-radius:999px;transition:width .3s ease;}
.cand-pct{text-align:right;font-family:var(--font-head);font-weight:600;font-size:19px;font-variant-numeric:tabular-nums;letter-spacing:-.01em;}
.cutoff-row{display:flex;align-items:center;gap:10px;margin:1px 0;color:var(--text-muted);font-size:9.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;}
.cutoff-row::before,.cutoff-row::after{content:"";flex:1;height:0;border-top:1px dashed var(--menu-border);}
.bars-note{margin-top:10px;padding:9px 12px;background:var(--bg-surface);border-radius:10px;font-size:11.5px;color:var(--text-secondary);line-height:1.45;}
.bars-note b{font-weight:700;}

/* ---- map ---- */
.map-card{background:var(--bg-elevated);border-radius:16px;box-shadow:var(--card-shadow);padding:14px 16px 12px;}
.left-col > :last-child{margin-bottom:0;}
.map-caption{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin:0 0 8px 2px;}
.tx-map{position:relative;width:100%;max-width:540px;margin:0 auto;min-height:240px;border-radius:12px;overflow:hidden;background:var(--bg-elevated);}
.tx-map-svg{display:block;width:100%;height:100%;}
.tx-popup-floating{position:absolute;z-index:5;pointer-events:none;opacity:0;transition:opacity .12s ease;background:var(--bg-elevated);border:1px solid var(--menu-border);border-radius:10px;box-shadow:var(--menu-shadow);padding:.65rem .85rem;min-width:188px;max-width:210px;}
.map-legend{display:flex;flex-wrap:wrap;gap:8px 16px;margin-top:12px;padding-top:12px;border-top:1px solid var(--stroke);}
.county-editor{margin-top:14px;padding:0;}
.ce-sidebar-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.ce-close{flex-shrink:0;background:var(--bg-surface);border:1px solid var(--menu-border);border-radius:6px;width:26px;height:26px;cursor:pointer;color:var(--text-muted);font-size:12px;line-height:1;display:flex;align-items:center;justify-content:center;}
.ce-close:hover{background:#e4e6ef;color:var(--text-primary);}
.ce-card{padding:14px 18px 16px;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--text-secondary);}
.legend-swatch{width:11px;height:11px;border-radius:3px;flex-shrink:0;}
.legend-name{font-weight:600;}
.legend-count{font-variant-numeric:tabular-nums;color:var(--text-muted);font-weight:600;background:var(--bg-surface);border-radius:999px;padding:0 7px;font-size:10.5px;}

/* MapLibre popup -> tooltip spec */
.tx-popup-title{font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid var(--stroke);}
.tx-popup-head{display:flex;justify-content:space-between;font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);margin-bottom:4px;}
.tx-popup-row{display:flex;justify-content:space-between;align-items:center;gap:12px;font-size:12px;color:var(--text-secondary);padding:2.5px 0;font-variant-numeric:tabular-nums;}
.tx-popup-name{font-weight:600;}
.tx-popup-row b{font-weight:600;}
.tx-popup-margin{margin-top:5px;padding-top:6px;border-top:1px solid var(--stroke);font-size:10.5px;color:var(--text-muted);}
.tx-popup-margin span{letter-spacing:.06em;}

/* ---- cards / controls ---- */
.vh-card{background:var(--bg-elevated);border:1px solid var(--menu-border);border-radius:16px;box-shadow:var(--card-shadow);overflow:hidden;margin-bottom:14px;}
.card-header{width:100%;display:flex;justify-content:space-between;align-items:center;padding:15px 18px;cursor:pointer;background:transparent;border:none;text-align:left;font-family:inherit;}
.card-header:hover{background:#fafbfd;}
.card-title-text{font-family:var(--font-head);font-size:15px;font-weight:600;letter-spacing:-.01em;color:var(--text-primary);}
.card-header-right{display:flex;align-items:center;}
.chev{color:var(--text-muted);transition:transform .2s ease;display:flex;}
.chev.open{transform:rotate(180deg);}
.card-body{padding:14px 18px 16px;border-top:1px solid var(--stroke);}
.sub-section-title{font-family:var(--font-head);font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:3px;}
.sub-section-sub{font-size:11px;color:var(--text-muted);line-height:1.45;margin-bottom:10px;}
.bracket-group{margin-top:14px;}
.bracket-group:first-of-type{margin-top:0;}
.bracket-group-head{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:4px;padding-bottom:5px;border-bottom:1px solid var(--stroke);}
.slider-row{padding:9px 0;border-top:1px solid var(--stroke);}
.slider-row:first-of-type{border-top:none;padding-top:4px;}
.slider-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;gap:12px;}
.slider-lbl{font-size:12.5px;font-weight:600;color:var(--text-primary);}
.slider-hint{display:block;font-size:11px;color:var(--text-muted);margin-top:2px;}
.slider-val{font-size:12.5px;font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap;}
.vh-slider{-webkit-appearance:none;appearance:none;width:100%;background:transparent;cursor:pointer;margin:4px 0;--thumb-color:var(--accent);}
.vh-slider::-webkit-slider-runnable-track{height:5px;background:var(--bg-surface);border-radius:999px;}
.vh-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:15px;height:15px;border-radius:50%;background:var(--thumb-color);margin-top:-5px;border:2.5px solid #fff;box-shadow:0 1px 4px rgba(53,28,113,.25);transition:transform .14s ease;}
.vh-slider::-webkit-slider-thumb:hover{transform:scale(1.15);}
.vh-slider::-moz-range-track{height:5px;background:var(--bg-surface);border-radius:999px;}
.vh-slider::-moz-range-thumb{width:15px;height:15px;border-radius:50%;background:var(--thumb-color);border:2.5px solid #fff;}
.reset-btn{position:sticky;bottom:0;z-index:4;width:100%;min-height:48px;margin-top:6px;background:var(--bg-elevated);border:1px solid var(--secondary-border);border-radius:8px;font-family:var(--font-body);font-size:14px;font-weight:600;color:var(--accent-deep);cursor:pointer;transition:background-color 160ms ease,border-color 160ms ease,color 160ms ease;}
.reset-btn:hover{background:var(--bg-surface);}
.reset-btn:active{background:#e4e6ef;}
.error-pane{padding:20px;margin:20px;font-family:ui-monospace,Menlo,monospace;font-size:12px;white-space:pre-wrap;color:#dc2626;background:#fef2f2;border:1px solid #fecaca;border-radius:12px;}

/* MapLibre nav control on-brand */
@media(max-width:760px){.vh-root{padding:20px 14px 48px;}.cand-row{grid-template-columns:1fr auto;gap:7px 12px;}.cand-name-block{grid-column:1;grid-row:1;}.cand-pct{grid-column:2;grid-row:1;font-size:17px;}.bar-track{grid-column:1 / -1;grid-row:2;}
.tx-popup-floating{min-width:130px;max-width:152px;padding:6px 8px;border-radius:8px;}
.tx-popup-title{font-size:10.5px;margin-bottom:4px;padding-bottom:4px;}
.tx-popup-head{font-size:7.5px;margin-bottom:3px;}
.tx-popup-row{font-size:9.5px;gap:8px;padding:1.5px 0;}
.tx-popup-margin{font-size:8.5px;margin-top:3px;padding-top:4px;}}


/* candidate colors (this race) */
:root{
  --ford-strong:#2980b9;
  --hill-strong:#7c3aed;
  --arterburn-strong:#16a085;
  --bayfield-strong:#e67e22;
  --cooper-strong:#c0392b;
}
.ford{color:var(--ford-strong);}
.hill{color:var(--hill-strong);}
.arterburn{color:var(--arterburn-strong);}
.bayfield{color:var(--bayfield-strong);}
.cooper{color:var(--cooper-strong);}

/* yellow notice (guide series-5 #f1c40f); matches VoteHub cards: rounded 16px, soft shadow, one uniform fill, no accent stripe */
.info-box{background:#fcefb4;border:1px solid #ecd06a;border-radius:16px;box-shadow:var(--card-shadow,0 4px 14px rgba(23,25,38,.08));padding:8px 13px;margin:0 0 16px 0;font-size:11.5px;line-height:1.4;color:var(--text-secondary);}

/* county map fills its card; default size for stacked/mobile layouts */
.tx-map.tx-map-gl{height:clamp(360px,52vh,620px);max-width:none;margin:0;}
.tx-map-canvas{position:absolute;top:0;left:0;right:0;bottom:0;}
.map-fallback{display:flex;align-items:center;justify-content:center;height:100%;padding:18px;text-align:center;color:var(--text-muted);font-size:13px;line-height:1.5;}
/* tighter outer padding */
.vh-root{padding:14px 18px 18px;}
/* compact candidate result rows so the map gets more room */
.cand-bars{padding:6px 20px 12px;}
.cand-row{grid-template-columns:240px 1fr 64px;gap:14px;padding:9px 0;}
.cand-avatar{width:32px;height:32px;}
.cand-name{font-size:15px;}
.cand-sub{font-size:11px;}
.cand-pct{font-size:21px;}
.bar-track{height:18px;}
/* desktop: cap the left column to the viewport and let the map flex to fill the rest, so the whole board fits one screen for a screenshot */
@media(min-width:1201px){.left-col{display:flex;flex-direction:column;gap:12px;height:calc(100vh - 32px);min-height:0;}.cand-bars{flex:0 0 auto;margin-bottom:0;}.info-box{flex:0 0 auto;margin-bottom:0;}.map-card{flex:1 1 auto;min-height:0;margin-bottom:0;display:flex;flex-direction:column;}.tx-map.tx-map-gl{flex:1 1 auto;height:auto;min-height:0;}.vh-grid{grid-template-columns:1fr 460px;}.groups-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:stretch;flex:1;grid-auto-rows:1fr;}.groups-grid .vh-card{margin-bottom:0;display:flex;flex-direction:column;}.demo-header{margin:0 2px 8px;}.card-header{padding:7px 12px;}.card-title-text{font-size:12px;}.card-body{padding:3px 12px 9px;flex:1;display:flex;flex-direction:column;justify-content:space-evenly;}.groups-grid .slider-row{border-top:none;}.slider-row{padding:3px 0;}.slider-head{margin-bottom:2px;}.slider-lbl{font-size:11.5px;}.slider-val{font-size:11.5px;}.vh-slider{margin:2px 0;}.vh-slider::-webkit-slider-thumb{width:13px;height:13px;margin-top:-4px;}.vh-slider::-moz-range-thumb{width:13px;height:13px;}.right-col{display:flex;flex-direction:column;}.reset-btn{min-height:36px;margin-top:8px;}}

  <script>

  ? new URL("../data/", APP_SCRIPT.src).href
  : "data/";
const assetUrl = p => new URL(p, ASSET_BASE_URL).href;

/* ──────────── CONFIG (per race) ──────────── */
const CANDIDATES = [
  {
    "id": "ford",
    "cls": "ford",

  },
  {
    "id": "arterburn",
    "cls": "arterburn",
    "name": "Sunshine Arterburn",
    "party": "D",
    "sub": "Laboratory supervisor",
    "color": "var(--arterburn-strong)"
  },
  {
    "id": "bayfield",
    "cls": "bayfield",

];
const HEX = {
  "ford": "#2980b9",
  "hill": "#7c3aed",
  "arterburn": "#16a085",
  "bayfield": "#e67e22",

};
const CAND_BY_ID = Object.fromEntries(CANDIDATES.map(c => [c.id, c]));
const ALL_IDS = CANDIDATES.map(c => c.id);
const NAMED = CANDIDATES;
const NAMED_IDS = ALL_IDS;
const CSV_FILE = "nevada_counties.csv";
const GEOJSON_FILE = "nevada-counties.geojson";
const RCV_NOTE = "";
const INFO_NOTE = "Default values are an even starting point, not a VoteHub prediction or forecast. No public primary polling exists for this race.";

/* Grouping dimension: demographic groups (race) or age brackets, per dashboard. */
const GROUPS = [
  {
    "id": "hisp",
    "label": "Hispanic / Latino"
  },
  {
    "id": "white",
    "label": "White"
  },
  {
    "id": "black",
    "label": "Black"
  },
  {
    "id": "asian",
    "label": "Asian"
  }
];
const GROUPS_TITLE = "Demographics";
const GROUPS_SUB = "Each candidate's share within a demographic group. Each group sums to 100%.";

/* Candidate support within each demographic group. Each group sums to 100%. */
const SUPPORT_DEFAULT = {
  "hisp": {
    "ford": 0.2,
    "hill": 0.2,
    "arterburn": 0.2,
    "bayfield": 0.2,
    "cooper": 0.2
  },
  "white": {
    "ford": 0.2,
    "hill": 0.2,
    "arterburn": 0.2,
    "bayfield": 0.2,
    "cooper": 0.2
  },
  "black": {
    "ford": 0.2,
    "hill": 0.2,
    "arterburn": 0.2,
    "bayfield": 0.2,
    "cooper": 0.2
  },
  "asian": {
    "ford": 0.2,
    "hill": 0.2,
    "arterburn": 0.2,
    "bayfield": 0.2,
    "cooper": 0.2
  }
};

const TIE_EPS = 0.1; // points; below this a county has no clear leader and stays neutral

const countyLabel = name => name === 'Carson City' ? name : name + ' County';

/* ──────────── MODEL (pure demographics, single-party primary) ────────────
   Each county's eligible population by group is fixed (Citizen Voting-Age
   Population). Each group carries a candidate-support row that sums to 1.
   A county's candidate totals are the CVAP-weighted sum across the groups.
   There is no partisan anchor: every candidate is in the same party, so there
   is no two-party split to tilt toward a past result. Shares are shown; vote
   totals are not displayed. A county can be hand-set, which bypasses the model. */
function countyResult(county, support) {
  const votes = {};
  for (const id of ALL_IDS) {
    let v = 0;
    for (const g of GROUPS) v += county.cvapTotal * (county.groups[g.id] / 100) * support[g.id][id];
    votes[id] = v;
  }
  const total = ALL_IDS.reduce((s, id) => s + votes[id], 0);
  return { votes, total };
}

function overrideResult(county, ov) {
  const votes = {};
  for (const id of ALL_IDS) votes[id] = county.cvapTotal * ((ov[id] || 0) / 100);
  const total = ALL_IDS.reduce((s, id) => s + votes[id], 0);
  return { votes, total };
}

function tally(counties, support, overrides) {
  const totals = Object.fromEntries(ALL_IDS.map(id => [id, 0]));
  let grand = 0;
  const perCounty = new Map();
  for (const county of counties) {
    const ov = overrides && overrides[county.name];
    const { votes, total } = ov ? overrideResult(county, ov) : countyResult(county, support);
    for (const id of ALL_IDS) totals[id] += votes[id];
    grand += total;
    const ranked = ALL_IDS.map(id => ({ id, v: votes[id] })).sort((a, b) => b.v - a.v);
    const margin = total > 0 ? (ranked[0].v - ranked[1].v) / total * 100 : 0;
    perCounty.set(county.name, {
      total,
      overridden: !!ov,
      leadId: margin >= TIE_EPS ? ranked[0].id : null,
      pct: total > 0 ? Object.fromEntries(ALL_IDS.map(id => [id, votes[id] / total * 100])) : {},
      margin
    });
  }
  const pct = Object.fromEntries(ALL_IDS.map(id => [id, grand > 0 ? totals[id] / grand * 100 : 0]));
  const ranked = ALL_IDS.map(id => ({ id, pct: pct[id] })).sort((a, b) => b.pct - a.pct);
  return { pct, grand, ranked, perCounty };
}

/* ──────────── DATA ──────────── */
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const headers = lines[0].split(",");
  const rows = new Array(lines.length - 1);
  for (let i = 1; i < lines.length; i++) {
    const vals = lines[i].split(",");
    const obj = {};
    for (let j = 0; j < headers.length; j++) obj[headers[j]] = vals[j];
    rows[i - 1] = obj;
  }
  return rows;
}

function buildCounties(rows) {
  return rows.map(r => {
    const groups = {};
    for (const g of GROUPS) groups[g.id] = +r[g.id + '_pct'] || 0;
    return { name: r.county, cvapTotal: +r.cvap_total || 0, groups };
  });
}

/* ──────────── MAP (MapLibre GL: VoteHub basemap under translucent county fills) ──────────── */
function popupHTML(name, res) {
  const lines = [`<div class="tx-popup-title">${countyLabel(name)}</div>`];
  if (res && res.total > 0) {
    lines.push(`<div class="tx-popup-head"><span>CANDIDATE</span><span>SHARE</span></div>`);
    ALL_IDS.map(id => ({ c: CAND_BY_ID[id], pct: res.pct[id] || 0 }))
      .sort((a, b) => b.pct - a.pct).slice(0, 6)
      .forEach(row => lines.push(
        `<div class="tx-popup-row"><span class="tx-popup-name ${row.c.cls}">${row.c.name}</span><b class="${row.c.cls}">${row.pct.toFixed(1)}%</b></div>`));
    const lead = res.leadId ? CAND_BY_ID[res.leadId] : null;
    if (lead) lines.push(`<div class="tx-popup-row tx-popup-margin"><span>LEAD</span><b class="${lead.cls}">${lead.name.split(' ').slice(-1)[0]} +${res.margin.toFixed(1)}</b></div>`);
    else lines.push(`<div class="tx-popup-row tx-popup-margin"><span>LEAD</span><b>Even</b></div>`);
  } else lines.push(`<div class="tx-popup-row"><span>No data</span></div>`);
  return lines.join("");
}

const NO_COUNTY = "\u0000";  /* a name no county has; hides the toggle outline layers */

function geojsonBounds(geojson) {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  const scan = c => {
    if (typeof c[0] === "number") {
      if (c[0] < minX) minX = c[0]; if (c[0] > maxX) maxX = c[0];
      if (c[1] < minY) minY = c[1]; if (c[1] > maxY) maxY = c[1];
    } else for (const k of c) scan(k);
  };
  for (const f of geojson.features) scan(f.geometry.coordinates);
  return [[minX, minY], [maxX, maxY]];
}
function padBounds(b, pad) {
  return [[b[0][0] - pad, b[0][1] - pad], [b[1][0] + pad, b[1][1] + pad]];
}
/* county fill color = the leader's color; neutral grey on a tie or with no data */
function fillColorExpr(countyResults) {
  const expr = ["match", ["get", "name"]];
  if (countyResults) for (const [name, r] of countyResults) expr.push(name, (r && HEX[r.leadId]) || "#e3e3ea");
  if (expr.length === 2) return "#e3e3ea";       // match needs at least one pair
  expr.push("#e3e3ea");
  return expr;
}
function overriddenNames(countyResults) {
  const out = [];
  if (countyResults) for (const [name, r] of countyResults) if (r && r.overridden) out.push(name);
  return out;
}

function CountyChoropleth({ geojson, basemapStyle, countyResults, onSelect, selected }) {
  const containerRef = useRef(null);
  const mapDivRef = useRef(null);
  const tipRef = useRef(null);
  const mapRef = useRef(null);
  const readyRef = useRef(false);
  const resultsRef = useRef(countyResults); resultsRef.current = countyResults;
  const selectedRef = useRef(selected); selectedRef.current = selected;
  const onSelectRef = useRef(onSelect); onSelectRef.current = onSelect;

  const applyResults = (map, res) => {
    map.setPaintProperty("county-fill", "fill-color", fillColorExpr(res));
    map.setFilter("county-outline-override", ["in", ["get", "name"], ["literal", overriddenNames(res)]]);
  };
  const applySelected = (map, sel) => {
    map.setFilter("county-outline-selected", ["==", ["get", "name"], sel || NO_COUNTY]);
  };

  /* build the map once, when geometry + basemap style are both available */
  useEffect(() => {
    if (!mapDivRef.current || !geojson || !basemapStyle) return;
    if (typeof maplibregl === "undefined") {
      mapDivRef.current.innerHTML = '<div class="map-fallback">This map needs MapLibre GL, which did not load.</div>';
      return;
    }
    const style = (typeof basemapStyle === "string") ? JSON.parse(basemapStyle) : basemapStyle;
    const bounds = geojsonBounds(geojson);
    let map;
    try {
      map = new maplibregl.Map({
        container: mapDivRef.current,
        style: style,
        dragRotate: false,
        pitchWithRotate: false,
        bounds: bounds,
        fitBoundsOptions: { padding: 40, animate: false }
      });
    } catch (err) {
      mapDivRef.current.innerHTML = '<div class="map-fallback">This map could not start (WebGL may be unavailable in this browser).</div>';
      return;
    }
    mapRef.current = map;
    if (map.touchZoomRotate) map.touchZoomRotate.disableRotation();
    map.addControl(new maplibregl.NavigationControl({ showCompass: false }), "top-right");

    const firstSymbolId = () => {
      const layers = (map.getStyle() && map.getStyle().layers) || [];
      const s = layers.find(l => l.type === "symbol");
      return s ? s.id : undefined;
    };

    map.on("error", e => { if (e && e.error) console.error("basemap error:", e.error.message || e.error); });

    let layersAdded = false;
    const addCountyLayers = () => {
      if (layersAdded || !map.isStyleLoaded()) return;
      layersAdded = true;
      map.addSource("counties", { type: "geojson", data: geojson });
      const before = firstSymbolId();   // keep place + road labels above the county fills
      map.addLayer({ id: "county-fill", type: "fill", source: "counties",
        paint: { "fill-color": fillColorExpr(resultsRef.current), "fill-opacity": 0.7 } }, before);
      map.addLayer({ id: "county-outline", type: "line", source: "counties",
        paint: { "line-color": "#ffffff", "line-width": 0.7 } }, before);
      map.addLayer({ id: "county-outline-override", type: "line", source: "counties",
        filter: ["in", ["get", "name"], ["literal", []]],
        paint: { "line-color": "#1d1810", "line-width": 1.8, "line-dasharray": [3, 2] } }, before);
      map.addLayer({ id: "county-outline-selected", type: "line", source: "counties",
        filter: ["==", ["get", "name"], NO_COUNTY],
        paint: { "line-color": "#1a1a1a", "line-width": 2.2 } }, before);
      map.addLayer({ id: "county-outline-hover", type: "line", source: "counties",
        filter: ["==", ["get", "name"], NO_COUNTY],
        paint: { "line-color": "#1a1a1a", "line-width": 1.6 } }, before);

      readyRef.current = true;
      applyResults(map, resultsRef.current);
      applySelected(map, selectedRef.current);
      map.resize();

      const canvas = map.getCanvas();
      map.on("mousemove", "county-fill", e => {
        if (!e.features || !e.features.length) return;
        const name = e.features[0].properties.name;
        canvas.style.cursor = "pointer";
        map.setFilter("county-outline-hover", ["==", ["get", "name"], name]);
        const tip = tipRef.current, cont = containerRef.current;
        if (!tip || !cont) return;
        tip.innerHTML = popupHTML(name, resultsRef.current && resultsRef.current.get(name));
        tip.style.opacity = "1";
        const tw = tip.offsetWidth, th = tip.offsetHeight;
        const cw = cont.clientWidth, ch = cont.clientHeight;
        let left = e.point.x + 14;
        if (left + tw > cw - 6) left = e.point.x - 14 - tw;
        left = Math.max(6, Math.min(left, cw - tw - 6));
        let top = e.point.y + 16;
        if (top + th > ch - 6) top = e.point.y - 16 - th;
        top = Math.max(6, Math.min(top, ch - th - 6));
        tip.style.left = left + "px"; tip.style.top = top + "px";
      });
      map.on("mouseleave", "county-fill", () => {
        canvas.style.cursor = "";
        map.setFilter("county-outline-hover", ["==", ["get", "name"], NO_COUNTY]);
        if (tipRef.current) tipRef.current.style.opacity = "0";
      });
      map.on("click", "county-fill", e => {
        if (e.features && e.features.length && onSelectRef.current) onSelectRef.current(e.features[0].properties.name);
      });
    };
    map.on("load", addCountyLayers);
    map.on("styledata", addCountyLayers);
    if (map.isStyleLoaded()) addCountyLayers();

    const ro = (typeof ResizeObserver !== "undefined") ? new ResizeObserver(() => map.resize()) : null;
    if (ro) ro.observe(mapDivRef.current);
    return () => { readyRef.current = false; if (ro) ro.disconnect(); map.remove(); mapRef.current = null; };
  }, [geojson, basemapStyle]);

  /* recolor when the model output changes */
  useEffect(() => {
    const map = mapRef.current;
    if (map && readyRef.current) applyResults(map, countyResults);
  }, [countyResults]);

  /* move the selection outline */
  useEffect(() => {
    const map = mapRef.current;
    if (map && readyRef.current) applySelected(map, selected);
  }, [selected]);

  return h("div", { ref: containerRef, className: "tx-map tx-map-gl" },
    h("div", { ref: mapDivRef, className: "tx-map-canvas" }),
    h("div", { ref: tipRef, className: "tx-popup tx-popup-floating" }));
}

function SliderRow({ label, hint, value, onChange, max = 100, step = 0.5, suffix = '%', color = '#1d1810' }) {
  const v = Number(value);
  return h("div", { className: "slider-row" },
    h("div", { className: "slider-head" },
      h("div", null,
        h("span", { className: "slider-lbl" }, label),
        hint && h("span", { className: "slider-hint" }, hint)),
      h("span", { className: "slider-val", style: { color } }, `${v.toFixed(step >= 1 ? 0 : 1)}${suffix}`)),
    h("input", { type: "range", className: "vh-slider", min: 0, max, step, value, onChange: e => onChange(+e.target.value), style: { '--thumb-color': color } }));
}

function CollapsibleCard({ title, defaultOpen, children }) {
  const [open, setOpen] = useState(defaultOpen);
  return h("div", { className: "vh-card collapsible" },
    h("button", { className: "card-header", onClick: () => setOpen(!open) },
      h("span", { className: "card-title-text" }, title),
      h("div", { className: "card-header-right" },
        h("span", { className: `chev ${open ? 'open' : ''}` },
          h("svg", { width: "12", height: "12", viewBox: "0 0 12 12" },
            h("path", { d: "M3 4.5L6 7.5L9 4.5", stroke: "currentColor", strokeWidth: "1.5", fill: "none", strokeLinecap: "round", strokeLinejoin: "round" }))))),
    open && h("div", { className: "card-body" }, children));
}

function candPhoto(id) {
  if (typeof window !== "undefined" && window.__PHOTOS__ && window.__PHOTOS__[id]) return window.__PHOTOS__[id];
  return assetUrl(`photos/${id}.jpg`);
}

function CandRow({ cand, pct, status }) {
  const avatar = h("img", { className: "cand-avatar", src: candPhoto(cand.id), alt: cand.name, loading: "lazy",
    onError: e => { e.target.style.visibility = 'hidden'; } });
  return h("div", { className: "cand-row" },
    h("div", { className: "cand-name-block" },
      avatar,
      h("div", { className: "cand-text" },
        h("div", { className: "cand-name", style: { color: cand.color } },
          h("span", { className: "cand-name-text" }, cand.name),
          h("span", { className: "party-tag dem" }, cand.party),
          status === 'leads' && h("span", { className: "advances-badge" }, "Leads")),
        h("div", { className: "cand-sub" }, cand.sub))),
    h("div", { className: "bar-track" }, h("div", { className: "bar-fill", style: { width: `${Math.min(100, pct)}%`, background: cand.color } })),
    h("div", { className: "cand-pct", style: { color: cand.color } }, `${pct.toFixed(1)}%`));
}

function PrimaryDashboard() {
  const leftColRef = useRef(null);
  const rightColRef = useRef(null);

  const [support, setSupport] = useState(SUPPORT_DEFAULT);
  const [mapData, setMapData] = useState(null);
  const [basemapStyle, setBasemapStyle] = useState(null);
  const [countyOverrides, setCountyOverrides] = useState({});
  const [selectedCounty, setSelectedCounty] = useState(null);

  useEffect(() => {
    let cancelled = false;
    const ingest = (gj, csvText, style) => {
      if (cancelled) return;
      const counties = buildCounties(parseCSV(csvText));
      for (let i = 0; i < gj.features.length; i++) gj.features[i].id = i;
      setMapData({ geojson: gj, counties });
      if (style) setBasemapStyle(style);
    };
    if (typeof window !== "undefined" && window.__DATA_GEOJSON__ && window.__DATA_CSV__) {
      ingest(window.__DATA_GEOJSON__, window.__DATA_CSV__, window.__BASEMAP_STYLE__);
      return () => { cancelled = true; };
    }
    Promise.all([
      fetch(assetUrl(GEOJSON_FILE)).then(r => r.json()),
      fetch(assetUrl(CSV_FILE)).then(r => r.text()),
      fetch(assetUrl("basemap-style.json")).then(r => r.json()).catch(() => null)
    ]).then(([gj, csvText, style]) => ingest(gj, csvText, style)).catch(err => console.error("Data load failed:", err));
    return () => { cancelled = true; };
  }, []);

  // edit one candidate within a group; the others renormalize so the group sums to 1
  const setSup = (raceId, candId, vPct) => {
    const v = Math.max(0, Math.min(100, vPct)) / 100;
    setSupport(prev => {
      const row = prev[raceId];
      const others = ALL_IDS.filter(id => id !== candId);
      const otherSum = others.reduce((s, id) => s + row[id], 0);
      const remainder = Math.max(0, 1 - v);
      const next = { ...row, [candId]: v };
      if (otherSum > 0) others.forEach(id => { next[id] = row[id] / otherSum * remainder; });
      else others.forEach(id => { next[id] = remainder / others.length; });
      return { ...prev, [raceId]: next };
    });
  };

  const result = useMemo(
    () => mapData && mapData.counties ? tally(mapData.counties, support, countyOverrides) : null,
    [mapData, support, countyOverrides]
  );

  const countyModelPct = name => {
    const county = mapData && mapData.counties && mapData.counties.find(c => c.name === name);
    if (!county) return null;
    const { votes, total } = countyResult(county, support);
    return Object.fromEntries(ALL_IDS.map(id => [id, total > 0 ? votes[id] / total * 100 : 0]));
  };

  // set one candidate's share for a county; the others renormalize so it sums to 100
  const setCountyShare = (name, candId, vPct) => {
    const v = Math.max(0, Math.min(100, vPct));
    setCountyOverrides(prev => {
      const cur = prev[name] || countyModelPct(name) || Object.fromEntries(ALL_IDS.map(id => [id, 0]));
      const others = NAMED_IDS.filter(id => id !== candId);
      const otherSum = others.reduce((s, id) => s + (cur[id] || 0), 0);
      const remainder = Math.max(0, 100 - v);
      const next = { ...cur, [candId]: v };
      if (otherSum > 0) others.forEach(id => { next[id] = (cur[id] || 0) / otherSum * remainder; });
      else others.forEach(id => { next[id] = remainder / others.length; });
      return { ...prev, [name]: next };
    });
  };

  const clearCountyOverride = name => setCountyOverrides(prev => {
    const next = { ...prev }; delete next[name]; return next;
  });

  const resetAll = () => { setSupport(SUPPORT_DEFAULT); setCountyOverrides({}); };

  useEffect(() => {
    const leftCol = leftColRef.current, rightCol = rightColRef.current;
    if (!leftCol || !rightCol) return;
    const sync = () => {
      if (window.matchMedia('(max-width: 1200px)').matches) { rightCol.style.removeProperty('--sidebar-match-height'); return; }
      rightCol.style.setProperty('--sidebar-match-height', `${Math.round(leftCol.getBoundingClientRect().height)}px`);
    };
    const raf = () => requestAnimationFrame(sync);
    sync();
    const ro = typeof ResizeObserver !== 'undefined' ? new ResizeObserver(raf) : null;
    ro && ro.observe(leftCol);
    window.addEventListener('resize', raf);
    return () => { ro && ro.disconnect(); window.removeEventListener('resize', raf); };
  }, [result]);

  const ranked = result && result.ranked || [];
  const leaderId = ranked.length && (ranked.length < 2 || ranked[0].pct - ranked[1].pct >= TIE_EPS) ? ranked[0].id : null;
  const rowStatus = id => id === leaderId ? 'leads' : null;

  const leaderCounts = {};
  if (result && result.perCounty) for (const v of result.perCounty.values()) { if (v.leadId) leaderCounts[v.leadId] = (leaderCounts[v.leadId] || 0) + 1; }
  const legend = NAMED_IDS.map(id => ({ id, n: leaderCounts[id] || 0 })).filter(x => x.n > 0).sort((a, b) => b.n - a.n);

  return h("div", { className: "vh-root" },
    h("div", { className: "vh-wrap" },
      h("div", { className: "vh-grid" },

        /* ── LEFT COLUMN ── */
        h("div", { ref: leftColRef, className: "left-col" },
          h("div", { className: "cand-bars" },
            ranked.map(r => h(CandRow, { key: r.id, cand: CAND_BY_ID[r.id], pct: r.pct, status: rowStatus(r.id) }))),
          INFO_NOTE && h("div", { className: "info-box" }, INFO_NOTE),
          h("div", { className: "vh-card map-card" },
            h("div", { className: "map-caption" }, "Click any county to set it by hand."),
            RCV_NOTE && h("div", { className: "map-caption" }, RCV_NOTE),
            h(CountyChoropleth, { geojson: mapData && mapData.geojson, basemapStyle: basemapStyle, countyResults: result && result.perCounty,
              onSelect: name => setSelectedCounty(prev => prev === name ? null : name), selected: selectedCounty }),
            h("div", { className: "map-legend" },
              legend.map(x => h("div", { className: "legend-item", key: x.id },
                h("span", { className: "legend-swatch", style: { background: HEX[x.id] } }),
                h("span", { className: "legend-name" }, CAND_BY_ID[x.id].name.split(' ').slice(-1)[0]),
                h("span", { className: "legend-count" }, x.n)))))),

        /* ── RIGHT COLUMN ── */
        h("div", { ref: rightColRef, className: "right-col" },
          selectedCounty
            ? (() => {
                const ov = countyOverrides[selectedCounty];
                const shares = ov || countyModelPct(selectedCounty) || {};
                return h(React.Fragment, null,
                  h("div", { className: "demo-header ce-sidebar-head" },
                    h("div", null,
                      h("div", { className: "demo-title" }, countyLabel(selectedCounty)),
                      h("div", { className: "demo-sub" }, "Set shares by hand")),
                    h("button", { className: "ce-close", onClick: () => setSelectedCounty(null), title: "Close" }, "\u2715")),
                  h("div", { className: "vh-card ce-card" },
                    NAMED.map(c => h(SliderRow, {
                      key: c.id, label: c.name,
                      value: shares[c.id] || 0,
                      onChange: v => setCountyShare(selectedCounty, c.id, v),
                      max: 100, step: 0.5, suffix: '%', color: c.color
                    }))),
                  ov && h("button", { className: "reset-btn", onClick: () => clearCountyOverride(selectedCounty) }, "Clear override (return to demographics)"));
              })()
            : h(React.Fragment, null,
                h("div", { className: "demo-header" },
                  h("div", { className: "demo-title" }, GROUPS_TITLE),
                  h("div", { className: "demo-sub" }, GROUPS_SUB)),
                h("div", { className: "groups-grid" }, GROUPS.map(g => h(CollapsibleCard, { key: g.id, title: g.label, defaultOpen: true },
                  NAMED.map(c => h(SliderRow, {
                    key: c.id, label: c.name,
                    value: support[g.id][c.id] * 100,
                    onChange: v => setSup(g.id, c.id, v),
                    max: 100, step: 0.5, suffix: '%', color: c.color
                  }))))),
                h("button", { className: "reset-btn", onClick: resetAll }, "Reset All Levers"))))));
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(h(PrimaryDashboard, null));
} catch (e) {
  console.error(e);
  document.getElementById('root').innerHTML = '<div class="error-pane">' + e.message + '\n\n' + (e.stack || '') + '</div>';
}

  </script>
</body>

</html>
